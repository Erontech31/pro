<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento e Fluência Leitora</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos Base - Interface Técnica e Limpa */
        body { 
            font-family: 'Nunito', sans-serif; 
            background: #f4f6f9; 
            color: #2c3e50; 
            margin: 0;
            padding: 0;
        }

        /* ==================================================
           TELA INICIAL - APARÊNCIA DE VIDRO COMPLETA
           ================================================== */
        .home-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow: hidden;
        }
        
        /* Imagem de fundo com ajuste para o vidro refletir bem */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fundo.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.92;
            z-index: -2;
            background-color: #f4f6f9;
            transform: scale(1.05); /* Evita bordas pretas no desfoque */
        }

        /* Camada de vidro sutil sobre TODO o fundo da tela */
        .home-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -1;
        }

        /* CARD PRINCIPAL - VIDRO FOSCO AVANÇADO */
        .home-content {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08));
            padding: 55px 45px;
            border-radius: 28px;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-bottom-color: rgba(255, 255, 255, 0.35);
            border-right-color: rgba(255, 255, 255, 0.35);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.18), /* Sombra externa profunda */
                inset 0 1px 0 rgba(255, 255, 255, 0.8), /* Brilho superior reflexo */
                inset 0 -1px 0 rgba(0, 0, 0, 0.05); /* Sombra interna inferior */
            backdrop-filter: blur(22px) saturate(190%);
            -webkit-backdrop-filter: blur(22px) saturate(190%);
            text-align: center;
            max-width: 90%;
            width: 620px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* Efeito de levitação e brilho extra ao passar o mouse */
        .home-content:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 20px 55px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                inset 0 -1px 0 rgba(0, 0, 0, 0.05);
        }

        /* Brilho diagonal sutil no canto superior do vidro */
        .home-content::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.25), transparent);
            border-radius: 28px 28px 0 0;
            pointer-events: none;
        }

        .home-content h1 {
            position: relative;
            z-index: 1;
            font-size: 2.3rem;
            color: #1a365d;
            margin-top: 0;
            margin-bottom: 45px;
            line-height: 1.2;
            font-weight: 900;
            text-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.7),
                0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .home-buttons {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* BOTÕES - TAMBÉM COM EFEITO DE VIDRO */
        .app-btn {
            flex: 1;
            min-width: 220px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.2));
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-bottom-color: rgba(255, 255, 255, 0.4);
            color: #234e7c;
            padding: 28px 22px;
            font-size: 1.25rem;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 
                0 6px 20px rgba(49, 130, 206, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            font-family: inherit;
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
        }

        .app-btn:hover {
            background: linear-gradient(135deg, rgba(49, 130, 206, 0.85), rgba(49, 130, 206, 0.7));
            color: #ffffff;
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.85);
            box-shadow: 
                0 18px 35px rgba(49, 130, 206, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .app-btn:active {
            transform: translateY(-4px) scale(0.99);
        }

        .btn-icon {
            font-size: 3.2rem;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }

        .app-btn:hover .btn-icon {
            transform: scale(1.1) rotate(-3deg);
        }

        /* RODAPÉ - TAMBÉM INTEGRADO AO VIDRO */
        .home-footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            color: #1a202c;
            font-weight: 900;
            padding: 10px 20px;
            margin: 0 20px;
            max-width: calc(100% - 40px);
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
        }

        /* ==================================================
           DEMAIS TELAS E FUNCIONALIDADES - SEM ALTERAÇÕES
           ================================================== */
        .main-wrapper {
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            position: relative;
        }

        .back-btn {
            background: none;
            border: none;
            color: #718096;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            padding: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
            font-family: inherit;
        }

        .back-btn:hover {
            color: #3182ce;
        }

        .app-title { 
            text-align: center; 
            color: #2c3e50; 
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        .form-group { margin-bottom: 18px; }
        label { font-weight: 700; display: block; margin-bottom: 8px; color: #4a5568; font-size: 0.95rem; }
        input[type="text"], textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e0; 
            border-radius: 6px; 
            font-family: inherit; 
            font-size: 0.95rem; 
            box-sizing: border-box; 
            transition: border 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3182ce;
        }
        textarea { height: 120px; resize: vertical; }
        
        button.action-btn { 
            background: #3182ce; 
            color: #fff; 
            border: none; 
            padding: 12px 24px; 
            font-size: 1rem; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 700;
            transition: background 0.2s;
            width: 100%;
        }
        button.action-btn:hover { background: #2b6cb0; }
        
        button.print-btn { 
            background: #48bb78; 
            margin-top: 20px; 
        }
        button.print-btn:hover { background: #38a169; }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: #f7fafc;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .mode-btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1px solid #cbd5e0;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            color: #4a5568;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: #4a5568;
            color: #fff;
            border-color: #4a5568;
        }

        .result-area {
            margin-top: 25px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .result-title { 
            text-align: center; 
            font-weight: 700; 
            margin-bottom: 1.2em; 
        }

        .result-area.mode-dynamic {
            border: 2px dashed #cbd5e0;
            font-size: 16px; 
            line-height: 1.7; 
            text-align: left;
        }
        .result-area.mode-dynamic .result-title {
            color: #2b6cb0;
            font-size: 20px;
        }
        .result-area.mode-dynamic .word-silaba {
            display: inline-block;
            padding: 2px 6px;
            margin: 3px;
            background: #fefcbf;
            border: 1px solid #faf089; 
            border-radius: 6px;
            color: #2d3748;
            font-weight: 700;
        }
        .result-area.mode-dynamic .word-enumerada {
            display: inline-block;
            position: relative;
            padding: 2px 8px;
            margin: 12px 4px 4px 4px;
            background: #e2e8f0;
            border-radius: 6px;
            color: #2d3748;
            font-weight: 700;
        }
        .result-area.mode-dynamic .word-number {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #e53e3e;
            color: #FFF;
            font-size: 10px; 
            font-weight: 700;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-area.mode-formal {
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            font-family: 'Arial', sans-serif;
            font-size: 12pt; 
            line-height: 1.5; 
            text-align: justify;
            color: #000;
            padding: 20px;
        }
        .result-area.mode-formal .result-title {
            color: #000;
            font-size: 14pt;
            text-transform: uppercase;
            font-weight: bold;
        }
        .result-area.mode-formal .word-silaba {
            display: inline-block;
            padding: 2px 6px;
            margin: 3px;
            background: none;
            border: 1px solid #000; 
            border-radius: 6px;
            color: #000;
            font-weight: normal;
        }
        .result-area.mode-formal .word-enumerada {
            display: inline;
            position: relative;
            padding: 0;
            margin: 0 4px 0 0;
            background: none;
            border-radius: 0;
            color: #000;
            font-weight: normal;
        }
        .result-area.mode-formal .word-number {
            position: static;
            transform: none;
            display: inline;
            font-size: 8pt; 
            color: #444;
            background: none;
            border: none;
            width: auto;
            height: auto;
            margin-right: 2px;
            vertical-align: super;
            font-weight: normal;
        }

        @media print {
            body { background: transparent; padding: 0; margin: 0; }
            .main-wrapper { padding: 0; }
            .container { box-shadow: none; border: none; padding: 0; max-width: 100%; }
            .no-print, .mode-selector, .home-screen { display: none !important; }
            
            #main-app { display: block !important; }

            .result-area { margin: 0; border: none; padding: 0; }
            
            .result-area.mode-dynamic { font-size: 13px; line-height: 1.4; }
            .result-area.mode-formal { font-size: 11pt; line-height: 1.4; }
            .result-area.mode-formal .result-title { font-size: 12pt; margin-bottom: 1em; }
            
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="home-screen" class="home-screen">
        <div class="bg-image"></div>
        <div class="home-content">
            <h1>Painel de Monitoramento<br>e Fluência Leitora</h1>
            <div class="home-buttons">
                <button class="app-btn" onclick="abrirSilabas()">
                    <span class="btn-icon">✂️</span>
                    Dividir Texto
                </button>
                <button class="app-btn" onclick="abrirEnumeracao()">
                    <span class="btn-icon">🔢</span>
                    Texto Enumerado
                </button>
            </div>
        </div>
        <footer class="home-footer">
            &copy; Desenvolvido por Eronildo Tavares, com foco em desenvolvimento na fluência em leitura.
        </footer>
    </div>

    <!-- APLICATIVO: DIVISÃO SILÁBICA -->
    <div class="main-wrapper" id="app-silabas" style="display: none;">
        <div class="container">
            <button class="back-btn no-print" onclick="voltarHome()">&#8592; Voltar ao Início</button>
            <h1 class="app-title no-print">Divisão Silábica</h1>
            <div class="no-print">
                <div class="form-group">
                    <label>Título da Atividade:</label>
                    <input type="text" id="title-silabas" placeholder="Ex: Avaliação Diagnóstica de Fluência">
                </div>
                <div class="form-group">
                    <label>Texto para Processamento:</label>
                    <textarea id="text-silabas" placeholder="Insira o texto para segmentação silábica..."></textarea>
                </div>
                <button class="action-btn" id="btn-silabas">Gerar Divisão Silábica</button>
            </div>
            <div class="result-area mode-dynamic" id="result-silabas-container" style="display:none;">
                <div class="mode-selector no-print">
                    <button class="mode-btn active" onclick="alterarModo('silabas', 'dynamic')">Modo Dinâmico</button>
                    <button class="mode-btn" onclick="alterarModo('silabas', 'formal')">Modo Formal (Padrão CAEd)</button>
                </div>
                <div class="result-title" id="out-title-silabas"></div>
                <div id="out-text-silabas"></div>
                <button class="action-btn print-btn no-print" onclick="window.print()">Imprimir Atividade</button>
            </div>
        </div>
    </div>

    <!-- APLICATIVO: CONTAGEM DE PALAVRAS -->
    <div class="main-wrapper" id="app-enum" style="display: none;">
        <div class="container">
            <button class="back-btn no-print" onclick="voltarHome()">&#8592; Voltar ao Início</button>
            <h1 class="app-title no-print">Contagem de Palavras</h1>
            <div class="no-print">
                <div class="form-group">
                    <label>Título da Atividade:</label>
                    <input type="text" id="title-enum" placeholder="Ex: Teste de Velocidade de Leitura">
                </div>
                <div class="form-group">
                    <label>Texto para Processamento:</label>
                    <textarea id="text-enum" placeholder="Insira o texto para aplicação dos índices numéricos..."></textarea>
                </div>
                <button class="action-btn" id="btn-enum">Gerar Contagem de Palavras</button>
            </div>
            <div class="result-area mode-dynamic" id="result-enum-container" style="display:none;">
                <div class="mode-selector no-print">
                    <button class="mode-btn active" onclick="alterarModo('enum', 'dynamic')">Modo Dinâmico</button>
                    <button class="mode-btn" onclick="alterarModo('enum', 'formal')">Modo Formal (Padrão CAEd)</button>
                </div>
                <div class="result-title" id="out-title-enum"></div>
                <div id="out-text-enum"></div>
                <button class="action-btn print-btn no-print" onclick="window.print()">Imprimir Atividade</button>
            </div>
        </div>
    </div>

    <script>
        // Navegação entre telas
        function abrirSilabas() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-silabas').style.display = 'block';
            document.getElementById('app-enum').style.display = 'none';
        }
        function abrirEnumeracao() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-enum').style.display = 'block';
            document.getElementById('app-silabas').style.display = 'none';
        }
        function voltarHome() {
            document.getElementById('app-silabas').style.display = 'none';
            document.getElementById('app-enum').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
        }

        // Alternar modos Dinâmico / Formal
        function alterarModo(aba, modo) {
            const container = document.getElementById(`result-${aba}-container`);
            const botoes = container.querySelectorAll('.mode-btn');
            if (modo === 'dynamic') {
                container.classList.remove('mode-formal');
                container.classList.add('mode-dynamic');
                botoes[0].classList.add('active');
                botoes[1].classList.remove('active');
                if (aba === 'silabas') {
                    container.querySelectorAll('.word-silaba').forEach(w => {
                        w.textContent = w.textContent.replace(/\s*\|\s*/g, '-');
                    });
                }
            } else {
                container.classList.remove('mode-dynamic');
                container.classList.add('mode-formal');
                botoes[0].classList.remove('active');
                botoes[1].classList.add('active');
                if (aba === 'silabas') {
                    container.querySelectorAll('.word-silaba').forEach(w => {
                        w.textContent = w.textContent.replace(/-/g, ' | ');
                    });
                }
            }
        }

        // Algoritmo de divisão silábica PT-BR
        function dividirSilabasPT(palavra, separador = "-") {
            let p = palavra.trim();
            if (!p) return "";
            let pontuacaoFim = p.match(/[.,\/#!$%\^&\*;:{}=\-_`~()?«»"'\\]+$/) || "";
            let pontuacaoInicio = p.match(/^[.,\/#!$%\^&\*;:{}=\-_`~()?«»"'\\]+/) || "";
            let termo = p.replace(/^[.,\/#!$%\^&\*;:{}=\-_`~()?«»"'\\]+|[.,\/#!$%\^&\*;:{}=\-_`~()?«»"'\\]+$/g, "");
            if (termo.length <= 1) return p;

            const vogais = "aeiouáéíóúâêôãõàíúéóáîôûçAEIOUÁÉÍÓÚÂÊÔÃÕÀÍÚÉÓÁÎÔÛÇ";
            let s = termo.split('');
            let tipos = s.map(l => vogais.includes(l) ? 'V' : 'C');
            let cortes = new Array(s.length).fill(false);
            
            for (let i = 0; i < s.length - 1; i++) {
                let c1 = s[i].toLowerCase(), c2 = s[i+1].toLowerCase(), c3 = (i + 2 < s.length) ? s[i+2].toLowerCase() : "";
                let t1 = tipos[i], t2 = tipos[i+1], t3 = tipos[i+2] || '';
                
                if ((c1==='r' && c2==='r') || (c1==='s' && c2==='s') || (c1==='s' && c2==='c') || (c1==='s' && c2==='ç') || (c1==='x' && c2==='c')) { cortes[i] = true; continue; }
                if ((c1==='c' && c2==='h') || (c1==='l' && c2==='h') || (c1==='n' && c2==='h') || (c1==='g' && c2==='u') || (c1==='q' && c2==='u')) { continue; }
                if (t1 === 'C' && t2 === 'C' && ['r', 'l'].includes(c2)) { continue; }
                if (t1 === 'V' && t2 === 'C' && t3 === 'V') { cortes[i] = true; continue; }
                if (t1 === 'V' && t2 === 'C' && t3 === 'C') {
                    if ((['r', 'l'].includes(c3) && c2 !== c3 && c2 !== 's') || c3 === 'h' || (c2 === 'g' && c3 === 'u') || (c2 === 'q' && c3 === 'u')) { cortes[i] = true; }
                    continue;
                }
                if (t1 === 'C' && t2 === 'C') { cortes[i] = true; continue; }
                if (t1 === 'V' && t2 === 'V') {
                    let ditongos = ["ai", "au", "ei", "eu", "oi", "ou", "ui", "ia", "ie", "io", "ua", "ue", "uo", "ão", "õe", "ao", "eo", "oa", "iu"];
                    if (!ditongos.includes(c1 + c2)) { cortes[i] = true; }
                }
            }
            
            let finalStr = "";
            for(let i=0; i<s.length; i++) {
                finalStr += s[i];
                if (cortes[i]) finalStr += separador; 
            }
            return pontuacaoInicio + finalStr + pontuacaoFim;
        }

        // Gerar divisão silábica
        document.getElementById('btn-silabas').addEventListener('click', () => {
            const title = document.getElementById('title-silabas').value;
            const text = document.getElementById('text-silabas').value;
            const outTitle = document.getElementById('out-title-silabas');
            const outText = document.getElementById('out-text-silabas');
            const container = document.getElementById('result-silabas-container');
            outTitle.innerHTML = title;
            outText.innerHTML = '';
            const isFormal = container.classList.contains('mode-formal');
            const sep = isFormal ? ' | ' : '-';
            const paragraphs = text.split('\n');
            paragraphs.forEach(p => {
                if (p.trim() === '') { outText.innerHTML += '<br>'; return; }
                const pDiv = document.createElement('div');
                pDiv.style.marginBottom = '12px';
                const words = p.trim().split(/\s+/);
                words.forEach(w => {
                    pDiv.innerHTML += `<span class="word-silaba">${dividirSilabasPT(w, sep)}</span> `;
                });
                outText.appendChild(pDiv);
            });
            container.style.display = 'block';
        });

        // Gerar enumeração de palavras
        document.getElementById('btn-enum').addEventListener('click', () => {
            const title = document.getElementById('title-enum').value;
            const text = document.getElementById('text-enum').value;
            const outTitle = document.getElementById('out-title-enum');
            const outText = document.getElementById('out-text-enum');
            const container = document.getElementById('result-enum-container');
            outTitle.innerHTML = title;
            outText.innerHTML = '';
            let counter = 1;
            const paragraphs = text.split('\n');
            paragraphs.forEach(p => {
                if (p.trim() === '') { outText.innerHTML += '<br>'; return; }
                const pDiv = document.createElement('div');
                pDiv.style.marginBottom = '12px';
                const words = p.trim().split(/\s+/);
                words.forEach(w => {
                    pDiv.innerHTML += `<span class="word-enumerada"><span class="word-number">${counter}</span>${w}</span> `;
                    counter++;
                });
                outText.appendChild(pDiv);
            });
            container.style.display = 'block';
        });
    </script>
</body>
</html>
